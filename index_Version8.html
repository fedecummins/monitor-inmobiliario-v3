<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Monitor Inmobiliario by fedecummins</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container-fluid">
      <span class="navbar-brand mb-0 h1">Monitor Inmobiliario</span>
    </div>
  </nav>
  <div class="container mt-4">
    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <form class="row g-2 align-items-end" id="filtros">
          <div class="col-auto">
            <label for="barrio" class="form-label">Barrio:</label>
            <select id="barrio" class="form-select">
              <option value="Vicente López">Vicente López</option>
              <option value="Florida">Florida</option>
              <option value="La Lucila">La Lucila</option>
            </select>
          </div>
          <div class="col-auto">
            <label for="tipoOperacion" class="form-label">Operación:</label>
            <select id="tipoOperacion" class="form-select">
              <option value="venta" selected>Venta</option>
            </select>
          </div>
          <div class="col-auto">
            <label for="tipoPropiedad" class="form-label">Propiedad:</label>
            <select id="tipoPropiedad" class="form-select">
              <option value="casa">Casa</option>
              <option value="terreno">Terreno</option>
              <option value="ph">PH</option>
            </select>
          </div>
          <div class="col-auto">
            <label for="precioMin" class="form-label">Precio mínimo (USD):</label>
            <input id="precioMin" type="number" class="form-control" value="220000" min="0" step="1000">
          </div>
          <div class="col-auto">
            <label for="precioMax" class="form-label">Precio máximo (USD):</label>
            <input id="precioMax" type="number" class="form-control" value="400000" min="0" step="1000">
          </div>
        </form>
      </div>
    </div>
    <div id="contenido"></div>
  </div>
  <script src="main.js"></script>
</body>
</html>
