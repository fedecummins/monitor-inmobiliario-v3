name: Daily Scraping — Monitor Inmobiliario

on:
  schedule:
    - cron: "0 11 * * *"  # 8:00 AM Argentina (UTC-3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config --local user.email "monitor-bot@github.com"
          git config --local user.name "Monitor Bot"
          git add data/properties.json
          git diff --staged --quiet || git commit -m "🏠 Update: $(date +'%Y-%m-%d %H:%M') ART"
          git push
