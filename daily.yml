name: Daily Scraping — Monitor Inmobiliario

on:
  schedule:
    # Runs every day at 8:00 AM Argentina time (UTC-3 → 11:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scripts/scraper.py

      - name: Commit updated data
        run: |
          git config --local user.email "monitor-bot@github.com"
          git config --local user.name "Monitor Inmobiliario Bot"
          git add data/properties.json
          git diff --staged --quiet || git commit -m "🏠 Update: $(date +'%Y-%m-%d %H:%M') ART"
          git push
